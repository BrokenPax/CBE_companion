<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<title>Cross Bronx NP Companion</title>
<link rel="manifest" href="manifest.json" />
<style>
:root{--bg:#f8fafc;--card:#ffffff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:24px}
.top{position:sticky;top:0;background:rgba(248,250,252,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:10}
.topin{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}.iconbtn{border:0;background:transparent;font-size:20px;padding:8px 10px;border-radius:12px}
.title{font-size:14px;font-weight:700}.wrap{padding:16px}.card{background:#fff;border-radius:24px;box-shadow:0 3px 16px rgba(15,23,42,.08);padding:18px;margin-bottom:16px}
.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.pill{display:inline-block;padding:4px 10px;border-radius:999px;color:#111827;font-size:12px;font-weight:700}
.pub{background:#38bdf8}.com{background:#f97316}.pri{background:#facc15}.ring-pub{outline:2px solid rgba(56,189,248,.35)} .ring-com{outline:2px solid rgba(249,115,22,.35)} .ring-pri{outline:2px solid rgba(250,204,21,.35)}
h1,h2,h3,p{margin:0}.muted{color:#64748b;font-size:14px}
.btn{width:100%;min-height:52px;border-radius:18px;border:1px solid #e2e8f0;background:#fff;padding:12px 14px;text-align:left;font-size:16px;color:#0f172a}
.btn.primary{background:#0f172a;color:#fff;border-color:#0f172a}.btn.secondary{background:#eef2ff}.btn.ghost{background:transparent;border-color:transparent}
.grid{display:grid;gap:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.small{font-size:12px;color:#64748b}.panel{background:#f1f5f9;border-radius:18px;padding:14px}.progress{height:8px;background:rgba(0,0,0,.08);border-radius:999px;overflow:hidden}.bar{height:100%;background:#0f172a}
.titleblue{color:#163a8a;font-size:18px;font-weight:800}.objblue{color:#1e3a8a;font-size:14px;font-weight:600}.trace{background:#f1f5f9;border-radius:16px;padding:10px 12px;font-size:14px}
.hint{border:1px dashed #cbd5e1;border-radius:18px;padding:14px;font-size:14px;color:#475569}.badge{font-size:12px;background:#f1f5f9;border-radius:999px;padding:4px 10px}.selected{background:#0f172a !important;color:#fff !important}
.stepon{background:#0f172a;color:#fff}.stepoff{background:#f1f5f9;color:#64748b}
.header-public{background:#7dd3fc;color:#0f172a}.header-community{background:#fdba74;color:#0f172a}.header-private{background:#fde047;color:#0f172a}
.checkcard{border:1px solid #a78bfa;background:#c4b5fd;color:#000}.targetcard{border:1px solid #047857;background:#a7f3d0;color:#000}
.bluebullet{border:1px solid #93c5fd;background:#dbeafe;color:#172554}
.result-resolved{border:1px solid #a7f3d0}.result-continue{border:1px solid #bae6fd}.result-discard{border:1px solid #fcd34d}
.iconbox{border-radius:16px;padding:12px}.ok{background:#d1fae5;color:#047857}.cont{background:#e0f2fe;color:#0369a1}.warn{background:#fef3c7;color:#b45309}
.chip{border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600}.chip-filled{background:#047857;color:#fff}.chip-empty{background:#0f172a;color:#fff;border:1px solid #047857}
#bullet-priority,.bullet-priority{font-size:1.5em;padding:20px;text-align:center;background-color:#ffcc00;border-radius:18px;color:#111827;font-weight:800;line-height:1.25;box-shadow:inset 0 0 0 1px rgba(15,23,42,.08)}
.bullet-priority-label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#854d0e;font-weight:800;margin-bottom:10px;text-align:center}
.bullet-priority-note{font-size:13px;color:#92400e;text-align:center;margin-top:10px;line-height:1.35}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="topin">
    <button class="iconbtn" id="backBtn">‹</button>
    <div class="title">Cross Bronx NP Companion</div>
    <button class="iconbtn" id="resetBtn">↺</button>
  </div></div>
  <div class="wrap" id="app"></div>
</div>
<script src="app.js"></script>
</body></html>
