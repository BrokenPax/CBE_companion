<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Cross Bronx NP Companion</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --muted: #64748b;
      --text: #0f172a;
      --primary: #0f172a;
      --blue: #163a8a;
      --blue2: #1e3a8a;
      --border: #e2e8f0;
      --soft: #f1f5f9;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 28px;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(248, 250, 252, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding-top: env(safe-area-inset-top);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
    }
    .icon-btn, .btn {
      border: 0;
      border-radius: 18px;
      background: white;
      color: var(--text);
      min-height: 48px;
      padding: 0 16px;
      font-weight: 600;
      box-shadow: var(--shadow);
      cursor: pointer;
    }
    .icon-btn { width: 48px; padding: 0; font-size: 20px; }
    .content { padding: 16px; display: grid; gap: 16px; }
    .card {
      background: var(--card);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 18px;
      border: 1px solid rgba(226,232,240,0.8);
    }
    .title { font-size: 20px; font-weight: 800; margin: 0; }
    .subtitle { color: var(--muted); margin-top: 4px; font-size: 14px; }
    .hero {
      display: flex; align-items: center; gap: 12px;
    }
    .hero-icon {
      width: 52px; height: 52px; border-radius: 18px; background: var(--primary); color: white;
      display: grid; place-items: center; font-size: 24px;
    }
    .soft {
      background: var(--soft);
      border-radius: 22px;
      padding: 14px;
      line-height: 1.5;
      font-size: 14px;
    }
    .grid { display: grid; gap: 12px; }
    .faction-item, .card-item, .trace-item, .row-chip {
      background: white;
      border-radius: 26px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(226,232,240,0.8);
      padding: 16px;
    }
    .faction-item { display: flex; justify-content: space-between; align-items: center; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 800; color: white;
    }
    .blue { background: #2563eb; }
    .green { background: #059669; }
    .amber { background: #d97706; }
    .section-head { font-size: 18px; font-weight: 800; }
    .section-sub { color: var(--muted); font-size: 14px; }
    .card-header { display:flex; justify-content: space-between; gap:12px; align-items:flex-start; }
    .card-name { color: var(--blue); font-weight: 800; font-size: 18px; }
    .card-objective { color: var(--blue2); font-weight: 600; font-size: 14px; margin-top: 4px; }
    .goal { background: #f1f5f9; border-radius: 999px; padding: 8px 12px; font-weight: 700; }
    .row-chip {
      padding: 14px 16px;
      background: #0b1738;
      color: white;
      border: none;
      box-shadow: none;
      border-radius: 24px;
    }
    .mode-grid, .answers { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .answers.one { grid-template-columns: 1fr; }
    .btn.primary { background: var(--primary); color: white; }
    .btn.secondary { background: #e2e8f0; }
    .btn.outline { background: white; border: 1px solid var(--border); }
    .progress-wrap { display: grid; gap: 8px; }
    .progressbar { height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .progress { height: 100%; background: linear-gradient(90deg,#2563eb,#0ea5e9); }
    .muted { color: var(--muted); }
    .row-panel {
      background: var(--soft); border-radius: 22px; padding: 14px;
    }
    .question { font-size: 22px; font-weight: 800; line-height: 1.2; }
    .trace-item { background: var(--soft); border-radius: 22px; box-shadow: none; }
    .result-icon {
      width: 52px; height: 52px; border-radius: 18px; display:grid; place-items:center; font-size: 24px;
    }
    .resolved { background: #dcfce7; color: #166534; }
    .discard { background: #fef3c7; color: #92400e; }
    .hidden { display: none !important; }
    .small { font-size: 14px; }
    .text-center { text-align:center; }
    .top-title {
      display:flex; align-items:center; gap: 8px; font-size: 14px; font-weight: 800;
    }
    .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
    .dot.public { background: #2563eb; }
    .dot.community { background: #059669; }
    .dot.private { background: #d97706; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-inner">
        <button id="backBtn" class="icon-btn" aria-label="Back">‹</button>
        <div class="top-title" id="topTitle">Cross Bronx NP Companion</div>
        <button id="resetBtn" class="icon-btn" aria-label="Reset">↺</button>
      </div>
    </div>
    <div class="content" id="screen"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
